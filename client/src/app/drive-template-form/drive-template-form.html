<div class="card my-5">
  <div class="card-body">
    <h2>{{ isEdit ? 'Vorlage bearbeiten' : 'Neue Vorlage erstellen' }}</h2>
    <form [formGroup]="templateForm" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Name</mat-label>
        <input matInput formControlName="name" placeholder="z.B. Arbeitsweg">
        @if (templateForm.get('name')?.hasError('required')) {
          <mat-error>
            Name ist erforderlich
          </mat-error>
        }
      </mat-form-field>

      <div class="row">
        <mat-form-field appearance="fill" class="half-width">
          <mat-label>Von</mat-label>
          <input matInput formControlName="from_location" placeholder="Startort">
        </mat-form-field>

        <mat-form-field appearance="fill" class="half-width">
          <mat-label>Nach</mat-label>
          <input matInput formControlName="to_location" placeholder="Zielort">
        </mat-form-field>
      </div>

      <div class="row">
        <mat-form-field appearance="fill" class="half-width">
          <mat-label>Länge (km)</mat-label>
          <input matInput type="number" formControlName="drive_length" min="1">
        </mat-form-field>

        <mat-form-field appearance="fill" class="half-width">
          <mat-label>Grund</mat-label>
          <mat-select formControlName="reason">
            @for (reason of reasons; track reason) {
              <mat-option [value]="reason">{{ Reason.toString(reason) }}</mat-option>
            }
          </mat-select>
        </mat-form-field>
      </div>

      <div class="actions">
        <button mat-raised-button color="primary" type="submit" [disabled]="!templateForm.valid">
          Speichern
        </button>
        <button mat-button type="button" routerLink="/driveTemplates">
          Abbrechen
        </button>
      </div>
    </form>
  </div>
</div>
