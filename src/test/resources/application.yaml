spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    ignore-migration-patterns: "*:missing"
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: dummy-id
            client-secret: dummy-secret
  web:
    resources:
      static-locations: classpath:/public/browser
