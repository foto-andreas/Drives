app:
  ocr:
    tesseract-path: ${TESSERACT_PATH:/usr/share/tesseract-ocr/5/tessdata}
    language: deu
    library-path: ${OCR_LIBRARY_PATH:}
    debug-enabled: ${OCR_DEBUG_ENABLED:false}
    debug-output-dir: ${OCR_DEBUG_DIR:}
    crop-width-ratio: 0.6
    crop-height-ratio: 0.35
    crop-min-height: 200
    max-width: 1600
    white-min-brightness: 200
    white-max-delta: 40
    min-white-pixels: 500
    roi-padding: 12
  geocoding:
    base-url: https://nominatim.openstreetmap.org/reverse
    user-agent: "fahrtenbuch/1.0 (contact: as@schrell.de)"
    email: "as@schrell.de"
    accept-language: "de"

spring:

  application:
    name: Fahrten

  datasource:
    url: jdbc:h2:file:~/data/drives
    driverClassName: org.h2.Driver
    username: sa
    password: password

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  web:
    resources:
      static-locations: classpath:/public/browser

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:fake-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:fake-secret}

logging:
  level:
    org:
      springframework:
        security: INFO

server:
  tomcat:
    remoteip:
      remote-ip-header: X-Forwarded-For
      protocol-header: X-Forwarded-Proto
